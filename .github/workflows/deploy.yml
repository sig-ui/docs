name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          echo "sig-ui.sigid.dev" > _site/CNAME
          cp index.html _site/index.html
          cp index.html _site/404.html
          cp styles.css _site/styles.css
          cp sigui/sigui.css _site/sigui.css
          cp dist/main.js _site/main.js
          cp favicon.ico _site/favicon.ico
          cp logo.svg _site/logo.svg

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
      - uses: actions/deploy-pages@v4
        id: deployment
